<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>503 Service Unavailable</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d10;
      color: #b8b8c4;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      text-align: center;
      padding: 3rem 2rem;
      max-width: 460px;
    }

    .ico {
      font-size: 3rem;
      margin-bottom: 1.5rem;
      opacity: .45;
      display: block;
      animation: drift 8s ease-in-out infinite;
    }

    @keyframes drift {
      0%, 100% { transform: translateY(0);   }
      50%       { transform: translateY(-6px); }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #dddde8;
      margin-bottom: .55rem;
      letter-spacing: -.025em;
    }

    .sub {
      font-size: .83rem;
      color: #64647a;
      line-height: 1.75;
      margin-bottom: 2.2rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #16161e;
      border: 1px solid #26263a;
      border-radius: 9999px;
      padding: .42rem 1.15rem;
      font-size: .72rem;
      color: #48486a;
      letter-spacing: .07em;
      text-transform: uppercase;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #5050ee;
      animation: blink 1.8s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: .15; }
      50%       { opacity: 1;   }
    }

    .ray {
      margin-top: 2.8rem;
      font-size: .68rem;
      color: #2a2a36;
      font-family: "Courier New", Courier, monospace;
      letter-spacing: .03em;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="ico">&#9949;</span>
    <h1>Service Unavailable</h1>
    <p class="sub">
      The origin server is temporarily offline or overloaded.<br>
      Our infrastructure team has been notified automatically.
    </p>
    <span class="pill">
      <span class="dot"></span>
      Investigating incident
    </span>
    <p class="ray">Error 1016 &nbsp;|&nbsp; Origin DNS error</p>
  </div>
</body>
</html>
