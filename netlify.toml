[build]
  command   = "npm run build"
  publish   = "public"

# Global response headers applied to all served paths
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control             = "no-store, no-cache, must-revalidate"
    X-Robots-Tag              = "noindex, nofollow"
    X-Content-Type-Options    = "nosniff"
    X-Frame-Options           = "DENY"
    Referrer-Policy           = "no-referrer"

# Edge pipeline — intercepts every request before static file serving
[[edge_functions]]
  function = "relay"
  path     = "/*"
