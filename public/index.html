<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>Service Temporarily Unavailable</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f11;
      color: #c0c0c8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wrapper {
      text-align: center;
      padding: 2.5rem 2rem;
      max-width: 440px;
    }
    .icon {
      font-size: 2.8rem;
      margin-bottom: 1.4rem;
      opacity: .55;
      animation: spin 12s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      color: #e2e2e8;
      margin-bottom: .8rem;
      letter-spacing: -.01em;
    }
    p {
      font-size: .875rem;
      color: #7c7c8a;
      line-height: 1.65;
      margin-bottom: 1.6rem;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #1a1a24;
      border: 1px solid #2c2c38;
      border-radius: 8px;
      padding: .4rem .9rem;
      font-size: .75rem;
      color: #5c5c6e;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4444ee;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: .3; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="icon">&#9881;</div>
    <h1>Scheduled Maintenance</h1>
    <p>
      This service is currently undergoing planned infrastructure maintenance.<br/>
      Normal operations will resume shortly.
    </p>
    <span class="badge">
      <span class="dot"></span>
      In Progress
    </span>
  </div>
</body>
</html>
